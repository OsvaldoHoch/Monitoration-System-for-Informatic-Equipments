<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSIE Dashboad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>DASHBOARD</h1>
        <form class="barra-pesquisa">
            <input type="text" id="textInput" onkeyup="filtrarTabela()" placeholder="O que você procura?">
            <button type="submit">
                <img src="https://cdn-icons-png.flaticon.com/512/3183/3183361.png" width="15px" alt="">
            </button>
        </form>
        <div class="status-contador" id="totalMaquinas">
            Conectando...
        </div>
    </header>

    
        <aside class="sidebar">
            <img src="../imgs/LogoDinorah.png" width="200px" style="margin-left: -10px;" alt="">
            <nav class="nav-sidebar">
                <ul>
                    <li><a class="nav-a" href="../DASHBOARD/index.html">DASHBOARD</a></li>
                    <li><a class="nav-a" href="../COMPUTADORES/index.html">COMPUTADORES</a></li>
                    <li><a class="nav-a" href="../COMPUTADORES/index.html">TURMAS</a></li>
                    <li><a class="nav-a" href="../ALUNOS/index.html">ALUNOS</a></li>
                    <li><a class="nav-a" href="../PROFESSORES/index.html">PROFESSORES</a></li>
                    <li><a class="nav-a" href="../SAIBA-MAIS/index.html">SAIBA MAIS</a></li>
                </ul>
            </nav>
        </aside>
    
    <div class="container">
        <main class="main-content">
            <div id="msgErro"></div>
            <table class="tabela" id="tabela">
                <thead>
                    <tr>
                        <th>Computador (Hostname)</th>
                        <th>Professor(a)</th>
                        <th>Turmas</th>
                        <th>Aluno(a)</th>
                        <th>Status Atual</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #777; ">Buscando dados do servidor...</td>
                    </tr>
                    <!-- <tr>
                        <td>NOTE-00</td>
                        <td>TESTER 00</td>
                        <td>TURMA TESTER</td>
                        <td>BETA TESTER</td>
                        <td>ON TEST</td>
                    </tr> -->
                </tbody>
            </table>
        </main>
    </div>

    <!-- Código JavaScript -->
    <script src="script.js"></script>
</body>
</html>
