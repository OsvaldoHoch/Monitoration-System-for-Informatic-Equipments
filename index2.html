<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSIE Dashboad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <h1>DASHBOARD</h1>
        <div class="status-contador" id="totalMaquinas">Conectando...</div>
    </header>

    
        <aside class="sidebar">
            <img src="imgs/LogoDinorah.png" width="200px" style="margin-left: -10px;" alt="">
            <nav class="nav-sidebar">
                <ul>
                    <li><a class="nav-a" href="#">DASHBOARD</a></li>
                    <li><a class="nav-a" href="#">COMPUTADORES</a></li>
                    <li><a class="nav-a" href="#">TURMAS</a></li>
                    <li><a class="nav-a" href="#">ALUNOS</a></li>
                    <li><a class="nav-a" href="#">PROFESSORES</a></li>
                    <li><a class="nav-a" href="#">SAIBA MAIS</a></li>
                </ul>
            </nav>
        </aside>
    
    <div class="container">
        <main class="main-content">
            <table class="tabela">
                <thead>
                    <tr>
                        <th>Computador (Hostname)</th>
                        <th>Professor(a)</th>
                        <th>Turmas</th>
                        <th>Aluno(a)</th>
                        <th>Status Atual</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #777; ">Buscando dados do servidor...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <!-- Código JavaScript -->
    <script src="script.js"></script>
</body>
</html>
