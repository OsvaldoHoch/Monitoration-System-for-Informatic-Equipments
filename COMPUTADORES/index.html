<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSIE Computadores</title>
    <link rel="stylesheet" href="../DASHBOARD/style.css">
</head>
<style>
    .selected {
        z-index: 10;
        position: absolute;
        background-color: rgba(7, 0, 81, 0.25);
        left: 0;
        margin-top: 50px;
        width: 15vw;
        height: 50px;
    }
</style>
<body>
    <header class="header">
        <h1>DASHBOARD</h1>
        <form class="barra-pesquisa">
            <input type="text" id="textInput" onkeyup="filtrarTabela()" placeholder="O que você procura?">
            <button type="submit">
                <img src="https://cdn-icons-png.flaticon.com/512/3183/3183361.png" width="15px" alt="">
            </button>
        </form>
        <div class="status-contador" id="totalMaquinas">
            Conectando...
        </div>
    </header>

    
        <aside class="sidebar">
            <img src="../imgs/LogoDinorah.png" width="200px" style="margin-left: 10px;" alt="">
            <nav class="nav-sidebar">
                <ul>
                    <div class="selected"></div>
                    <li><a class="nav-a" href="../DASHBOARD/index.html"><div class="nav-a-div">DASHBOARD</div></a></li>
                    <li><a class="nav-a" href="../COMPUTADORES/index.html"><div class="nav-a-div">COMPUTADORES</div></a></li>
                    <li><a class="nav-a" href="../TURMAS/index.html"><div class="nav-a-div">TURMAS</div></a></li>
                    <li><a class="nav-a" href="../ALUNOS/index.html"><div class="nav-a-div">ALUNOS</div></a></li>
                    <li><a class="nav-a" href="../PROFESSORES/index.html"><div class="nav-a-div">PROFESSORES</div></a></li>
                    <li><a class="nav-a" href="../SAIBA-MAIS/index.html"><div class="nav-a-div">SAIBA MAIS</div></a></li>
                </ul>
            </nav>
        </aside>
    
    <div class="container">
        <main class="main-content">
            <div id="msgErro"></div>
            <table class="tabela" style="width: 50vw;" id="tabela">
                <thead>
                    <tr>
                        <th>Computador (Hostname)</th>
                        <th>Alunos</th>
                        <th>Turma</th>
                        <th>Status Atual</th>
                    </tr>
                </thead>
                <tbody id="tabelaCorpo">
                    <tr>
                        <td colspan="4" style="text-align: center; color: #777; ">Buscando dados do servidor...</td>
                    </tr>
                </tbody>
            </table>
        </main>
    </div>

    <!-- Código JavaScript -->
    <script src="../DASHBOARD/script.js"></script>
</body>
</html>
